<!-- frontend/public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1877f2" />
    <meta name="description" content="Manage your Facebook saved items" />
    <title>Facebook Saves Manager</title>
</head>
<body>
    <div id="root"></div>
    <script>
        // Check for saved theme or system preference on initial load
        (function() {
            try {
                const savedTheme = localStorage.getItem('fbSavesTheme');
                if (savedTheme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                } else if (savedTheme === 'light') {
                    document.documentElement.classList.remove('dark-mode');
                } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark-mode');
                }
            } catch (e) {
                console.error('Failed to apply theme', e);
            }
        })();
    </script>
</body>
</html>
